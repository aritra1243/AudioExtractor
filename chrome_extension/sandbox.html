<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Restrictive CSP that permits local WASM execution but blocks external scripts -->
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; object-src 'self';">
  <!-- Load the single-threaded Emscripten glue script locally -->
  <script src="ffmpeg-core.js"></script>
</head>
<body>
  <script>
    window.addEventListener('message', async (event) => {
      const { action, fileData, wasmBinary, fileName } = event.data;
      
      if (action === 'convert') {
        try {
          window.parent.postMessage({ status: 'loading' }, '*');

          // Initialize the single-threaded Emscripten module using the preloaded WASM array buffer
          const Module = await createFFmpegCore({
            wasmBinary: wasmBinary,
            print: (text) => {
              console.log("[WASM stdout]", text);
              // Send conversion log cues to main window if needed
              if (text.startsWith("size=") || text.startsWith("frame=")) {
                window.parent.postMessage({ status: 'progress_log', log: text }, '*');
              }
            },
            printErr: (text) => console.warn("[WASM stderr]", text)
          });

          window.parent.postMessage({ status: 'writing' }, '*');
          Module.FS.writeFile('input_video', new Uint8Array(fileData));

          window.parent.postMessage({ status: 'converting' }, '*');

          const args = [
            '-i', 'input_video',
            '-vn',
            '-acodec', 'libmp3lame',
            '-ab', '128k',
            'output.mp3'
          ];

          // Invoke the main function. We use callMain if available, or fall back to manual argv pointer binding
          if (typeof Module.callMain === 'function') {
            Module.callMain(args);
          } else {
            const argc = args.length;
            const argv = Module._malloc(argc * 4);
            for (let i = 0; i < argc; i++) {
              const arg = args[i];
              const len = Module.lengthBytesUTF8(arg) + 1;
              const ptr = Module._malloc(len);
              Module.stringToUTF8(arg, ptr, len);
              Module.setValue(argv + i * 4, ptr, 'i32');
            }
            
            const mainFn = Module._proxy_main || Module._main;
            if (typeof mainFn === 'function') {
              mainFn(argc, argv);
            } else {
              throw new Error("FFmpeg main entry point not found in WASM core.");
            }
          }

          window.parent.postMessage({ status: 'reading' }, '*');
          const data = Module.FS.readFile('output.mp3');
          
          // Clean up virtual file references
          Module.FS.unlink('input_video');
          Module.FS.unlink('output.mp3');

          // Return array buffer to popup context via transferable object
          window.parent.postMessage({
            status: 'done',
            mp3Data: data.buffer,
            fileName: fileName.replace(/\.[^/.]+$/, "") + ".mp3"
          }, '*', [data.buffer]);

        } catch (error) {
          console.error("Sandbox processing error:", error);
          window.parent.postMessage({
            status: 'error',
            message: error.message || error.toString()
          }, '*');
        }
      }
    });
  </script>
</body>
</html>
